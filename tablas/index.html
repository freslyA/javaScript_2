<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla Arcade</title>
    <link rel="stylesheet" href="multiplicar.css">
    <script src="multiplicar.js"></script>
    <script src="utils.js"></script>

    <!-- Fuente arcade -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <button class="btn-probar" onclick="generarTabla()">PROBAR</button>
</header>

<main>
    <h1 class="titulo">TABLA ARCADE</h1>

    <div class="input-container">
        <label for="numero">INGRESA LA TABLA</label>
        <input type="number" id="numero" placeholder="Ej: 3">
    </div>

    <div class="tabla-container">
        <table>
            <thead>
                <tr>
                    <th>OPERACIÓN</th>
                    <th>RESULTADO</th>
                </tr>
            </thead>
            <tbody id="resultado">
                <tr><td>3 x 1</td><td>3</td></tr>
                <tr><td>3 x 2</td><td>6</td></tr>
                <tr><td>3 x 3</td><td>9</td></tr>
                <tr><td>3 x 4</td><td>12</td></tr>
                <tr><td>3 x 5</td><td>15</td></tr>
                <tr><td>3 x 6</td><td>18</td></tr>
                <tr><td>3 x 7</td><td>21</td></tr>
                <tr><td>3 x 8</td><td>24</td></tr>
                <tr><td>3 x 9</td><td>27</td></tr>
                <tr><td>3 x 10</td><td>30</td></tr>
            </tbody>
        </table>
    </div>
</main>

<footer>
    <p>GAME BY: Fresly Andino</p>
</footer>

</body>
</html>
